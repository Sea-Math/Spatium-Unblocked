<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("/sail/sw.js");
    </script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            overflow: hidden; /* prevents scrollbars from iframe taking 95vh */
        }
        
        .top-bar {
            height: 5vh;
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: #f0f0f0;
            gap: 10px;
        }

        iframe {
            height: 95vh;
            width: 100vw;
            background: #cfcfcf;
            position: absolute;
            left: 0;
            bottom: 0;
            border: none;
        }

        /* Settings Panel Styles */
        #settingsPanel {
            display: none;
            position: absolute;
            top: 6vh;
            left: 10px;
            background: white;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .setting-group {
            margin-bottom: 10px;
        }

        .setting-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .setting-group input, .setting-group select {
            width: 250px;
            padding: 5px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <input type="text" placeholder="url or search term" id="bar" style="width: 300px;">
        <button onclick="nav()">Go</button>
        <button onclick="toggleSettings()">⚙️ Settings</button>
    </div>

    <div id="settingsPanel">
        <h3>Settings</h3>
        <div class="setting-group">
            <label for="wispUrl">Wisp Server URL:</label>
            <input type="text" id="wispUrl" placeholder="wss://wisp.rhw.one/">
        </div>
        <div class="setting-group">
            <label for="searchEngine">Search Engine:</label>
            <select id="searchEngine">
                <option value="https://search.brave.com/search?q=">Brave</option>
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
                <option value="https://www.bing.com/search?q=">Bing</option>
            </select>
        </div>
        <button onclick="saveSettings()">Save & Apply</button>
        <button onclick="toggleSettings()">Cancel</button>
    </div>

    <iframe src="" id="frame"></iframe>

    <script>
        // --- Settings Management ---
        const defaultWisp = "wss://wisp.rhw.one/";
        const defaultSearch = "https://search.brave.com/search?q=";

        // Load settings from local storage or use defaults
        let currentWisp = localStorage.getItem("wispUrl") || defaultWisp;
        let currentSearch = localStorage.getItem("searchEngine") || defaultSearch;

        // Sync UI with current settings
        document.getElementById("wispUrl").value = currentWisp;
        document.getElementById("searchEngine").value = currentSearch;

        function toggleSettings() {
            const panel = document.getElementById("settingsPanel");
            panel.style.display = panel.style.display === "none" || panel.style.display === "" ? "block" : "none";
        }

        function saveSettings() {
            const newWisp = document.getElementById("wispUrl").value.trim() || defaultWisp;
            const newSearch = document.getElementById("searchEngine").value;

            // Save to localStorage
            localStorage.setItem("wispUrl", newWisp);
            localStorage.setItem("searchEngine", newSearch);

            // Update variables
            currentWisp = newWisp;
            currentSearch = newSearch;

            // Apply new Wisp transport
            connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: currentWisp }]);

            toggleSettings();
        }

        // --- Proxy Initialization ---
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js");
        // Initialize with the saved or default Wisp URL
        connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: currentWisp }]);

        const frame = document.getElementById("frame");
        const bar = document.getElementById("bar");

        const { ScramjetController } = $scramjetLoadController();
        const scramjet = new ScramjetController({
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/Spatium/travel/" 
        });
        
        scramjet.init();

        
        function nav() {
            let url = bar.value.trim();
            if (!url) return;

            // Check if it's a valid URL or a search query
            if (!url.includes(".") || url.includes(" ")) {
                // Use the selected search engine
                url = currentSearch + encodeURIComponent(url);
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url;
            }

            frame.src = scramjet.encodeUrl(url);
        }

        bar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                nav();
            }
        });
    </script>
</body>
</html>
